<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0 user-scalable=no"
    />
    <title>Promptr</title>
  </head>
  <body>
    <div class="promptrText">
      <h1>Promptr</h1>
    </div>

    <div id="addP" class="addPage">+</div>

    <div class="tapInstruction">
      <form
        id="uploadForm"
        action="{{ url_for('upload') }}"
        method="POST"
        enctype="multipart/form-data"
      >
        <input
          type="file"
          id="videoInput"
          name="video"
          accept="video/*"
          style="display: none"
        />
      </form>
      <p>Tap the icon to add a short video</p>
    </div>

    <!-- Upload overlay -->
    <div id="uploadOverlay" style="display: none">
      <div id="uploadCard">
        <div id="spinnerRing"></div>
        <p id="uploadLabel">Uploading video…</p>
        <div id="progressTrack">
          <div id="progressBar"></div>
        </div>
        <p id="uploadPercent">0%</p>
      </div>
    </div>

    <!-- Scripts go LAST so they can find the overlay div above -->
    <!-- <script src="{{ url_for('static', filename='script.js') }}"></script> -->
    <script src="{{ url_for('static', filename='upload.js') }}"></script>
  </body>
</html>
